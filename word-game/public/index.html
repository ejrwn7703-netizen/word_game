<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단어 맞추기 게임</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- 화면 1: 메인 화면 (닉네임 입력) -->
  <div id="screen-main" class="screen">
    <div class="card">
      <h1 class="title">단어 맞추기 게임</h1>

      <div class="form-group">
        <input
          id="nickname-input"
          type="text"
          class="input"
          placeholder="닉네임을 입력하세요"
          maxlength="10"
          autocomplete="off"
        >
      </div>

      <button id="create-room-btn" class="btn btn-primary" disabled>방 만들기</button>

      <div class="divider"><span>또는</span></div>

      <div class="row">
        <input
          id="room-code-input"
          type="text"
          class="input code-input"
          placeholder="방 코드"
          maxlength="6"
          autocomplete="off"
        >
        <button id="join-room-btn" class="btn btn-secondary" disabled>입장</button>
      </div>

      <p id="main-error" class="error-msg"></p>
    </div>
  </div>

  <!-- 화면 2: 대기실 -->
  <div id="screen-lobby" class="screen hidden">
    <div class="card">
      <div class="lobby-header">
        <div>
          <p class="label">방 코드</p>
          <p id="lobby-room-code" class="room-code"></p>
        </div>
        <button id="copy-link-btn" class="btn btn-outline">링크 복사</button>
      </div>

      <p id="player-count" class="player-count">참여자 (1명)</p>
      <ul id="player-list" class="player-list"></ul>

      <button id="start-game-btn" class="btn btn-primary hidden">게임 시작</button>
      <p id="lobby-min-players" class="hint-msg hidden">최소 2명 이상이 필요합니다.</p>
    </div>
  </div>

  <!-- 화면 3: 게임 화면 -->
  <div id="screen-game" class="screen hidden">
  </div>

  <!-- 화면 4: 결과 화면 -->
  <div id="screen-result" class="screen hidden">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/client.js"></script>
</body>
</html>
